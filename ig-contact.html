<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Slide — 1 Point of Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; background: #E6DED2; }
    body {
      font-family: 'Spectral', serif;
      background: linear-gradient(145deg, #F2EDE4 0%, #EAE2D6 55%, #E2D9CC 100%);
      color: #1B3872;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 64px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(27,56,114,0.45);
      letter-spacing: 0.01em;
    }
    .bg-photo {
      position: absolute;
      right: -4%;
      top: 50%;
      transform: translateY(-50%);
      width: 48%;
      height: 110%;
      background-image: url('brand_assets/phone image.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center right;
      opacity: 0.13;
      pointer-events: none;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      text-align: center;
    }
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6B7A50;
      margin-bottom: 28px;
    }
    .headline {
      font-family: 'Spectral', serif;
      font-size: 96px;
      font-weight: 400;
      color: #1B3872;
      line-height: 1.0;
      letter-spacing: -0.025em;
      margin-bottom: 80px;
    }
    .headline .num {
      font-size: 96px;
      line-height: 0.9;
    }
    .details {
      font-family: 'Spectral', serif;
      font-size: 52px;
      font-weight: 300;
      color: #6B7A50;
      line-height: 1.55;
      letter-spacing: 0.005em;
    }
    .details em {
      font-style: italic;
      color: rgba(27,56,114,0.5);
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">
<div class="headline">A New Home</div>
    <div class="details">
      For all things postpartum.
    </div>
  </div>
</body>
</html>
