<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Slide — Answer 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; background: #1B3872; }
    body {
      font-family: 'Spectral', serif;
      background: #1B3872;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 140px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
    }
    .content {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 140px;
      right: 64px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.35);
      margin-bottom: 40px;
    }
    .headline {
      font-family: 'Spectral', serif;
      font-size: 70px;
      font-weight: 400;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 48px;
    }
    .body {
      font-family: 'Spectral', serif;
      font-size: 34px;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      line-height: 1.55;
      letter-spacing: 0.005em;
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">
    <div class="divider"></div>
    <div class="headline">The medical system<br>treats birth as an ending.<br>Cleo celebrates<br>its beginning.</div>
    <div class="body">Your well-connected confidante.<br>Navigating the system,<br>doing the legwork,<br>managing every detail.</div>
  </div>
</body>
</html>
