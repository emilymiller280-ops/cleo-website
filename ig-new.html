<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; background: #E6DED2; }
    body {
      font-family: 'Spectral', serif;
      background: linear-gradient(145deg, #F2EDE4 0%, #EAE2D6 55%, #E2D9CC 100%);
      color: #1B3872;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 64px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(27,56,114,0.45);
      letter-spacing: 0.01em;
    }
    .content {
      position: absolute;
      bottom: 128px;
      left: 64px;
      right: 64px;
    }
    .headline {
      font-family: 'Spectral', serif;
      font-size: 72px;
      font-weight: 400;
      color: #1B3872;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }
    .subline {
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: rgba(27,56,114,0.55);
      line-height: 1.5;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">
    <div class="headline">Empowering you<br>to thrive<br>postpartum.</div>
    <div class="subline">We believe every mother deserves<br>the highest level of care.</div>
  </div>
</body>
</html>
