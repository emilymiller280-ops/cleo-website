<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IG Slide — Stats 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }
    body {
      font-family: 'Spectral', serif;
      background: #EAE2D6;
      color: #1B3872;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 64px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(27,56,114,0.45);
      letter-spacing: 0.01em;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 64px;
      right: 64px;
      transform: translateY(-50%);
      text-align: center;
    }
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6B7A50;
      margin-bottom: 28px;
    }
    .headline {
      font-family: 'Spectral', serif;
      font-size: 100px;
      font-weight: 400;
      color: #1B3872;
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin-bottom: 100px;
      max-width: 880px;
    }
    .swipe {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(27,56,114,0.4);
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">

    <div class="headline">maternal care<br>in the US is<br><em style="font-style:italic;">broken.</em></div>
    <div class="swipe">Swipe for the numbers →</div>
  </div>
</body>
</html>
