<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IG Slide — Cleo Closer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }
    body {
      font-family: 'Spectral', serif;
      background: #EAE2D6;
      color: #1B3872;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 64px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(27,56,114,0.45);
      letter-spacing: 0.01em;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      text-align: center;
    }
    .big-name {
      font-family: 'Spectral', serif;
      font-size: 160px;
      font-weight: 400;
      color: #1B3872;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 40px;
    }
    .tagline {
      font-family: 'Spectral', serif;
      font-size: 45px;
      font-weight: 300;
      font-style: normal;
      color: #6B7A50;
      line-height: 1.4;
      margin-bottom: 56px;
      margin-top: 60px;
    }
    .cta {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(27,56,114,0.45);
      margin-top: 64px;
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">
    <div class="big-name">Cleo</div>
    <div class="tagline">On a mission to make your life easier - from fertility, through pregnancy + postpartum.</div>
    <div class="cta">cleocare.co</div>
  </div>
</body>
</html>
