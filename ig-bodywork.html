<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Slide — Bodywork</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }
    body {
      font-family: 'Spectral', serif;
      background: linear-gradient(145deg, #1B3872 0%, #142d5e 55%, #0F2352 100%);
      color: #FAF8F4;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .wordmark {
      position: absolute;
      top: 56px;
      left: 64px;
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(250,248,244,0.4);
      letter-spacing: 0.01em;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 64px;
      right: 64px;
      transform: translateY(-50%);
    }
    .eyebrow {
      font-family: 'Spectral', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: rgba(27,56,114,0.5);
      margin-bottom: 24px;
    }
    .headline {
      font-family: 'Spectral', serif;
      font-size: 96px;
      font-weight: 300;
      color: #FAF8F4;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 160px;
    }
    .headline em {
      font-style: italic;
    }
    .body {
      font-family: 'Spectral', serif;
      font-size: 34px;
      font-weight: 300;
      color: rgba(250,248,244,0.62);
      line-height: 1.6;
      letter-spacing: 0.01em;
      margin-top: 64px;
      margin-bottom: 52px;
      max-width: 820px;
    }
    .cta {
      font-family: 'Spectral', serif;
      font-size: 30px;
      font-weight: 300;
      font-style: italic;
      color: rgba(180,198,140,0.9);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cta::before {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wordmark">Cleo</div>
  <div class="content">
<div class="headline">care that meets<br>you <em>where<br>you are.</em></div>
    <div class="body">personalized bodywork, massage, lymphatic<br>drainage &amp; acupuncture with providers who<br>specialize in fertility, pregnancy &amp; postpartum.</div>
    <div class="cta">sign up today + let Cleo handle the rest</div>
  </div>
</body>
</html>
