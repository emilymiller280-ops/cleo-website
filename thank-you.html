<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Cleo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #FAF8F4; color: #0D1F3C; -webkit-font-smoothing: antialiased; }
    :root {
      --navy: #1B3872; --ink: #0D1F3C; --ink-muted: #7888A8;
      --olive: #6B7A50; --olive-pale: #EEF1E6;
    }
    .heading-display { font-family: 'Spectral', serif; line-height: 1.05; letter-spacing: -0.02em; }
    .body-text { font-family: 'Inter', sans-serif; line-height: 1.7; }
  </style>
</head>
<body>

<!-- NAV -->
<header style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(250,248,244,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(27,56,114,0.07);">
  <nav style="max-width:1280px;margin:0 auto;padding:0 56px;height:76px;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="text-decoration:none;">
      <span style="font-family:'Spectral',serif;font-size:1.875rem;font-weight:400;color:var(--navy);letter-spacing:-0.01em;">Cleo</span>
    </a>
  </nav>
</header>

<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 56px;">
  <div style="text-align:center;max-width:480px;">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--olive-pale);display:flex;align-items:center;justify-content:center;margin:0 auto 32px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#6B7A50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 class="heading-display" style="font-size:clamp(2rem,4vw,2.75rem);color:var(--ink);margin-bottom:20px;">Thank you for your interest in joining our network.</h1>
    <p class="body-text" style="font-size:1.0625rem;color:var(--ink-muted);line-height:1.8;margin-bottom:40px;">We carefully review each submission and aim to be in touch within 1–2 business days.</p>
    <a href="index.html" style="font-family:'Inter',sans-serif;font-size:0.875rem;color:var(--navy);text-decoration:none;border-bottom:1px solid rgba(27,56,114,0.3);padding-bottom:2px;transition:border-color 0.15s ease;" onmouseover="this.style.borderColor='var(--navy)'" onmouseout="this.style.borderColor='rgba(27,56,114,0.3)'">Back to Home</a>
  </div>
</main>

</body>
</html>
